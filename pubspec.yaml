name: musician
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=2.19.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & Networking
  http: ^1.6.0
  
  # Audio Player
  just_audio: ^0.10.6
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # URL Launcher (untuk buka Spotify)
  url_launcher: ^6.3.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  deezer: ^1.0.0   

  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  flutter_local_notifications: ^22.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/headphones_clef.png
